<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civix - Portal Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(10, 20, 30, 0.9), rgba(0, 0, 0, 0.95)), url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        .survey-theme-modal {
            border: 2px solid rgba(241, 196, 15, 0.6) !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(241,196,15,0.05) !important;
            background: linear-gradient(135deg, rgba(30, 40, 50, 0.95), rgba(10, 20, 30, 0.95)) !important;
            position: relative;
        }

        .survey-theme-modal::before {
            content: "📐";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            opacity: 0.4;
            animation: pulseGlow 3s infinite;
            z-index: 5;
        }

        .survey-theme-modal::after {
            content: "🧭";
            position: absolute;
            top: 20px;
            right: 70px;
            font-size: 1.5rem;
            opacity: 0.4;
            animation: pulseGlow 3s infinite reverse;
            z-index: 5;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }
            50% { box-shadow: 0 0 25px rgba(241, 196, 15, 0.6); }
            100% { box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }
        }

        @media (max-width: 850px) {
            body { overflow: auto; padding: 20px; }
            .container { max-height: none; }
        }
    </style>
</head>
<body>
    <div class="container survey-theme-modal" id="regForm">
        <a href="index.html" class="close-modal" aria-label="Back to Home" style="text-decoration: none;">✖</a>
        <div class="login-left-image"></div>
        <div class="login-right-content">
            <div class="logo-area">
                <div class="circle-logo">CX</div>
                <h2>CIVIX</h2>
            </div>
            
            <div class="auth-toggle">
                <button type="button" id="toggleOwner" class="active" onclick="setAuthMode('owner')">Owner Entry</button>
                <button type="button" id="toggleEmployee" onclick="setAuthMode('employee')">Employee Login</button>
            </div>

            <form id="mainForm">
                <div id="ownerFields">
                    <input type="text" id="ownerName" placeholder="Owner/Company Name">
                    <input type="email" id="ownerEmail" placeholder="Owner Email ID">
                    <input type="password" id="ownerPass" placeholder="Old Password (Master)">
                </div>

                <div id="employeeFields" class="hidden">
                    <input type="text" id="empNameDisplay" placeholder="Your Name (Employee)">
                    <input type="email" id="empEmail" placeholder="Employee Email ID">
                    <input type="password" id="empPass" placeholder="Password">
                </div>

                <div class="captcha-container">
                    <div id="captchaBox" class="captcha-code"></div>
                    <button type="button" onclick="generateCaptcha()" class="refresh-btn">🔄</button>
                    <input type="text" id="captchaInput" placeholder="Enter Captcha">
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">Enter Portal</button>
                <div id="googleSection">
                    <div style="margin: 20px 0; opacity: 0.5;">OR</div>
                    <button type="button" class="btn-google" id="googleLoginBtn">
                        <svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="18px" height="18px" viewBox="0 0 48 48" class="abcRioButtonSvg">
                            <g>
                                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                                <path fill="none" d="M0 0h48v48H0z"></path>
                            </g>
                        </svg>
                        <span>Continue with Google</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
