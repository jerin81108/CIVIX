<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geo Mapping - Civil Survey</title>
    <script src="auth_guard.js"></script>
    <link rel="stylesheet" href="home_style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 500px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1; /* Keep map below dropdowns */
        }
        .map_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .map_controls {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        /* Dark Mode adjustments for Map */
        body.dark_theme .map_controls { background: #1e1e1e; color: white; }
        body.dark_theme .leaflet-tile { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3); }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="mini-logo" id="sidebarLogo">CS</div>
                <h3 id="sidebarCompanyName">Company</h3>
            </div>
            <nav class="menu">
                <a href="home.html" class="menu-item"><span>🏠</span> Home</a>
                <a href="profile.html" class="menu-item"><span>👤</span> Profile</a>
                <a href="survey.html" class="menu-item"><span>📊</span> Survey Logs</a>
                <a href="about.html" class="menu-item"><span>✨</span> About Creator</a>
                <a href="geo_map.html" class="menu-item active"><span>📍</span> Geo Map</a>

                <a href="settings.html" class="menu-item"><span>⚙️</span> Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="map_header">
                <h2>Interactive Land Mapping</h2>
                <button onclick="getLocation()" class="save-btn" style="width:auto; padding: 10px 20px;">📍 Find My Location</button>
            </div>

            <div id="map"></div>

            <div class="map_controls">
                <strong>Map Legend:</strong> Click anywhere on the map to mark a survey point. 
                Use the +/- buttons or your mouse wheel to zoom.
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const map = L.map('map').setView([20.5937, 78.9629], 5); // Centered on India

        // Add Map Tiles (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Click to add Marker
        map.on('click', function(e) {
            const lat = e.latlng.lat.toFixed(4);
            const lng = e.latlng.lng.toFixed(4);
            L.marker([lat, lng]).addTo(map)
                .bindPopup(`Survey Point<br>Lat: ${lat}<br>Lng: ${lng}`)
                .openPopup();
        });

        // Get User Location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    map.setView([lat, lng], 15);
                    L.marker([lat, lng]).addTo(map).bindPopup("Current Location").openPopup();
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        // Global Sync (Logo, Name, Theme)
        window.onload = function() {
            document.getElementById('sidebarCompanyName').innerText = localStorage.getItem("regCompany") || "Company";
            const savedLogo = localStorage.getItem("companyLogo");
            if (savedLogo) {
                document.getElementById('sidebarLogo').innerHTML = `<img src="${savedLogo}" style="width:100%; height:100%; border-radius:12px; object-fit:cover;">`;
            }
            if (localStorage.getItem("darkMode") === "enabled") {
                document.body.classList.add("dark_theme");
            }
        };
    </script>
</body>
</html>
