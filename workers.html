<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Management - Civix</title>
    <script src="auth_guard.js"></script>
    <link rel="stylesheet" href="home_style.css">
    <style>
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .admin-table th, .admin-table td { padding: 18px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .admin-table th { background: #2d5a27; color: white; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .delete-btn { background: #fee; color: #e74c3c; border: 1px solid #fcc; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .delete-btn:hover { background: #e74c3c; color: white; }
        .pass-masked { font-family: monospace; background: #eee; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .pass-visible { font-family: monospace; background: #fff5e6; color: #d35400; padding: 4px 8px; border-radius: 4px; border: 1px solid #fac; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-admin { background: #ebf5fb; color: #2980b9; }
        .badge-worker { background: #e8f5e9; color: #2d5a27; }
        .badge-user { background: #fef9e7; color: #f39c12; }
    </style>
</head>
<body style="background: #f8fbf8;">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="mini-logo" id="sidebarLogo" style="overflow:hidden">CS</div>
                <h3 id="displayCompany">CIVIX</h3>
            </div>
            <nav class="menu">
                <a href="home.html" class="menu-item"><span>🏠</span> Home</a>
                <a href="survey.html" class="menu-item"><span>📊</span> Survey Logs</a>
                <a href="workers.html" class="menu-item active"><span>👥</span> Employee Directory</a>
                <a href="admin.html" class="menu-item"><span>✔️</span> Approvals</a>
                <a href="about.html" class="menu-item"><span>✨</span> About Creator</a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="location.href='index.html'" class="logout-btn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div>
                    <h2 style="margin-bottom: 5px;">Employee Directory</h2>
                    <p style="font-size: 13px; color: #888; font-weight: 500;">Manage system access and original credentials.</p>
                </div>
                <button onclick="location.href='registration.html'" class="save-btn" style="width: auto; padding: 12px 25px; background: #2ecc71; color:white; border:none; border-radius:10px; cursor:pointer;">+ Create ID</button>
            </header>

            <div id="loading" style="text-align: center; padding: 50px; color: #888;">Fetching employee records...</div>
            
            <table class="admin-table" id="workersTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Employee Name</th>
                        <th>Email Address</th>
                        <th>Role</th>
                        <th>Record Password</th>
                        <th>Permissions</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="workerList"></tbody>
            </table>
        </main>
    </div>

    <script>
        const adminEmail = localStorage.getItem("regEmail");
        const adminRole = localStorage.getItem("userRole");

        // Auth Check
        if (adminRole !== "Admin") {
            alert("Administrative Access Only");
            window.location.href = "home.html";
        }

        async function loadEmployees() {
            try {
                const response = await authorizedFetch(`/api/admin/users/all?adminEmail=${adminEmail}`);
                const users = await response.json();
                
                const workerList = document.getElementById('workerList');
                workerList.innerHTML = '';
                
                users.forEach(user => {
                    const roleClass = user.role === 'Admin' ? 'badge-admin' : (user.role === 'Worker' ? 'badge-worker' : 'badge-user');
                    const passHtml = user.password ? 
                        `<span class="pass-masked" onclick="togglePass(this, '${user.password}')">•••••••• (Click to show)</span>` : 
                        `<span style="color:#ccc; font-size:11px;">Firebase Managed</span>`;
                    
                    const row = `
                        <tr>
                            <td style="font-weight:700; color:#2c3e50;">${user.name || 'Anonymous User'}</td>
                            <td style="color:#666;">${user.email}</td>
                            <td><span class="badge ${roleClass}">${user.role}</span></td>
                            <td>${passHtml}</td>
                            <td style="font-size:12px; color:#888;">${user.status}</td>
                            <td>
                                <button class="delete-btn" onclick="removeUser('${user.email}', '${user.name}')">Remove</button>
                            </td>
                        </tr>
                    `;
                    workerList.innerHTML += row;
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('workersTable').style.display = 'table';
                document.getElementById('displayCompany').innerText = localStorage.getItem("regCompany") || "CIVIX";
                loadSavedLogo();
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = 'Failed to load directory.';
            }
        }

        function togglePass(el, password) {
            if (el.classList.contains('pass-visible')) {
                el.innerText = '•••••••• (Click to show)';
                el.classList.remove('pass-visible');
            } else {
                el.innerText = password;
                el.classList.add('pass-visible');
            }
        }

        async function removeUser(email, name) {
            if (!confirm(`Are you absolutely sure you want to remove ${name} (${email})? This will permanently delete their account and access.`)) return;

            try {
                const response = await authorizedFetch('/api/admin/users/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminEmail, targetEmail: email })
                });

                if (response.ok) {
                    alert(`User ${name} has been successfully removed.`);
                    loadEmployees();
                } else {
                    const data = await response.json();
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Connection error.');
            }
        }

        function loadSavedLogo() {
            const savedLogo = localStorage.getItem("companyLogo");
            const sidebarLogoDiv = document.getElementById('sidebarLogo');
            if (savedLogo && sidebarLogoDiv) {
                sidebarLogoDiv.innerHTML = `<img src="${savedLogo}" style="width:100%; height:100%; border-radius:12px; object-fit:cover;">`;
            }
        }

        loadEmployees();

        (function applyTheme() {
            if (localStorage.getItem("darkMode") === "enabled") document.body.classList.add("dark_theme");
        })();
    </script>
</body>
</html>
