<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Approval - Civix</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .pending-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            max-width: 500px;
            margin: 100px auto;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h2 { margin-bottom: 15px; }
        p { opacity: 0.8; line-height: 1.6; }
        .back-link { margin-top: 30px; display: block; color: #fff; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="pending-container">
            <div class="icon">⏳</div>
            <h2>Account Pending Approval</h2>
            <p>Your registration request has been received. To maintain security, new accounts must be approved by a site administrator.</p>
            <p>You will be able to access the portal once your account is active. Please check back later.</p>
            <a href="index.html" class="back-link">Back to Login</a>
        </div>
    </div>
</body>
</html>
