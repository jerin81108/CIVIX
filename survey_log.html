<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survey Records</title>
    <script src="auth_guard.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="home_style.css">
    <style>
        .log_container { padding: 40px; }
        .horizontal_card {
            background: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 8px solid #2d5a27;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .data_item {
            flex: 1;
            min-width: 120px;
            padding: 5px 10px;
        }
        .label { font-size: 11px; color: #777; text-transform: uppercase; display: block; }
        .value { font-size: 14px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="log_container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Survey Logs</h1>
            <button onclick="exportToExcel()" class="save-btn" style="width:auto; padding: 8px 15px; background: #2ecc71; border: none; border-radius: 5px; color: white; cursor: pointer;">📥 Export to Excel</button>
        </div>
        <a href="home.html" style="text-decoration: none; color: #2d5a27;">← Back to Home</a>
        <hr>
        <div id="log_list"></div>
    </div>

    <script>
        const userEmail = localStorage.getItem("regEmail");
        const userRole = localStorage.getItem("userRole");

        window.onload = async function() {
            const list = document.getElementById('log_list');
            
            try {
                const response = await authorizedFetch(`/api/surveys?email=${userEmail}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                if (data.length === 0) {
                    list.innerHTML = "<p>No surveys found on server. Checking local storage...</p>";
                    const localData = JSON.parse(localStorage.getItem('survey_reports')) || [];
                    if (localData.length > 0) {
                        displayData(localData);
                    } else {
                        list.innerHTML = "<p>No surveys found anywhere.</p>";
                    }
                    return;
                }

                displayData(data);
            } catch (error) {
                console.error('Error fetching surveys:', error);
                list.innerHTML = "<p>Could not connect to server. Showing local records.</p>";
                const localData = JSON.parse(localStorage.getItem('survey_reports')) || [];
                displayData(localData);
            }
        };

        function displayData(data) {
            const list = document.getElementById('log_list');
            list.innerHTML = ""; // Clear existing
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = "horizontal_card";
                
                const canEdit = (item.createdBy === userEmail || userRole === 'Admin');
                const editBtn = canEdit ? `<button onclick="editRecord('${item._id}')" style="margin-top: 10px; background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Edit</button>` : '';

                const fileLink = item.filePath ? `<a href="${item.filePath}" target="_blank" style="color: #2d5a27;">Reach File 📄</a>` : 'N/A';

                div.innerHTML = `
                    <div class="data_item"><span class="label">Date/Time</span><span class="value">${item.date} ${item.time}</span></div>
                    <div class="data_item">
                        <span class="label">Customer</span>
                        <span class="value">${item.cli}</span><br>
                        <a href="tel:${item.cliNum}" style="font-size:11px; color:#2d5a27; text-decoration:none;">📞 ${item.cliNum || ''}</a>
                    </div>
                    <div class="data_item"><span class="label">File</span><span class="value">${fileLink}</span></div>
                    <div class="data_item"><span class="label">Location</span><span class="value">${item.loc}</span></div>
                    <div class="data_item"><span class="label">Size</span><span class="value">${item.size}</span></div>
                    ${editBtn}
                `;
                list.appendChild(div);
            });
        }

        function editRecord(id) {
            window.location.href = `survey_form.html?id=${id}`;
        }

        function exportToExcel() {
            const data = JSON.parse(localStorage.getItem('survey_reports')) || [];
            if (data.length === 0) return alert("Nothing to export");
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Logs");
            XLSX.writeFile(wb, "Civix_Survey_Log.xlsx");
        }
    </script>
</body>
</html>
