<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guest Inquiries (Messages) - Civix</title>
    <script src="auth_guard.js"></script>
    <link rel="stylesheet" href="home_style.css">
    <style>
        .msg-card { background: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-left: 6px solid #2d5a27; transition: 0.3s; }
        .msg-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .msg-body { background: #f9fbf9; padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; color: #444; border: 1px solid #eee; }
        .meta-group { display: flex; gap: 20px; font-size: 12px; color: #888; }
        .meta-item b { color: #2d5a27; }
        .reply-btn { background: #2d5a27; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body style="background: #f8fbf8;">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="mini-logo" id="sidebarLogo" style="overflow:hidden">CS</div>
                <h3 id="displayCompany">CIVIX</h3>
            </div>
            <nav class="menu">
                <p class="menu-label">Main Menu</p>
                <a href="home.html" class="menu-item"><span>🏠</span> Home</a>
                <a href="survey.html" class="menu-item"><span>📊</span> Survey Logs</a>
                <a href="messages.html" class="menu-item active"><span>✉️</span> Guest Messages</a>
                <a href="tickets.html" id="ticketLink" class="menu-item" style="display:none;"><span>🎫</span> Change Requests</a>
                <a href="workers.html" id="workerLink" class="menu-item" style="display:none;"><span>👥</span> Workers Directory</a>
                <a href="admin.html" id="adminLink" class="menu-item" style="display:none;"><span>✔️</span> Admin Approvals</a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="location.href='index.html'" class="logout-btn">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div style="flex:1;">
                    <h2 style="margin-bottom: 5px;">Guest Inquiries & Messages</h2>
                    <p style="font-size: 13px; color: #888; font-weight: 500;">Manage inquiries sent from your public site contact form.</p>
                </div>
            </header>

            <div id="loading" style="text-align: center; padding: 50px; color: #888;">Fetching visitor messages...</div>
            <div id="msgContainer"></div>
        </main>
    </div>

    <script>
        const adminEmail = localStorage.getItem("regEmail");
        const adminRole = localStorage.getItem("userRole");

        if (adminRole !== "Admin") {
            window.location.href = "home.html";
        }

        async function loadMessages() {
            try {
                const res = await authorizedFetch(`/api/messages/all?adminEmail=${adminEmail}`);
                const messages = await res.json();
                
                const container = document.getElementById('msgContainer');
                container.innerHTML = '';
                
                if (messages.length === 0) {
                    document.getElementById('loading').innerText = 'No guest inquiries yet.';
                    return;
                }
                
                messages.forEach(m => {
                    const card = document.createElement('div');
                    card.className = "msg-card";
                    card.innerHTML = `
                        <div class="msg-header">
                            <div>
                                <h3 style="margin-bottom:5px; color:#2d5a27;">${m.name}</h3>
                                <div class="meta-group">
                                    <span class="meta-item">📧 <b>${m.email}</b></span>
                                    <span class="meta-item">📞 <b>${m.phone}</b></span>
                                </div>
                            </div>
                            <span style="font-size:11px; color:#aaa;">Sent: ${new Date(m.createdAt).toLocaleString()}</span>
                        </div>
                        <div class="msg-body">
                            ${m.message || "<i>No text provided.</i>"}
                        </div>
                        <div style="margin-top:15px; text-align:right;">
                            <button class="reply-btn" onclick="location.href='mailto:${m.email}'">Quick Reply</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('displayCompany').innerText = localStorage.getItem("regCompany") || "CIVIX";
                loadSavedLogo();
                
                // Unhide admin controls
                if (adminRole === "Admin") {
                    ["ticketLink", "workerLink", "adminLink"].forEach(id => {
                        const el = document.getElementById(id);
                        if(el) el.style.display = "block";
                    });
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = 'Failed to load inquiries.';
            }
        }

        function loadSavedLogo() {
            const savedLogo = localStorage.getItem("companyLogo");
            const sidebarLogoDiv = document.getElementById('sidebarLogo');
            if (savedLogo && sidebarLogoDiv) {
                sidebarLogoDiv.innerHTML = `<img src="${savedLogo}" style="width:100%; height:100%; border-radius:12px; object-fit:cover;">`;
            }
        }

        loadMessages();
    </script>
</body>
</html>
